### OOP: Constructor functions

```js
function Konto(startsaldo) {
    this.saldo = startsaldo;

    this.zahleEin = function(betrag) {
        this.saldo += betrag;
    }

    this.hebeAb = function(betrag) {
        this.saldo -= betrag;
    }
}

let k1 = new Konto(100);
let k2 = new Konto(200);

k1.zahleEin(50);
k2.hebeAb(20);

console.log(k1.saldo);
console.log(k2.saldo);

console.log(k1);
console.log(k2);

console.log(k1.zahleEin === k2.zahleEin); // false
```

----

### OOP: Prototypes

```js
function Konto(startsaldo) {
    this.saldo = startsaldo;
}

Konto.prototype.zahleEin = function(betrag) {
    this.saldo += betrag;
}

Konto.prototype.hebeAb = function(betrag) {
    this.saldo -= betrag;
}

// ...

console.log(k1.zahleEin === k2.zahleEin); // true
```

----

### OOP: Classes (syntactic sugar, EcmaScript 6)

```js
class Konto {
    constructor(startsaldo) {
        this.saldo = startsaldo;
    }

    zahleEin(betrag) {
        this.saldo += betrag;
    }

    hebeAb(betrag) {
        this.saldo -= betrag;
    }
}
```

### Valid JavaScript is valid TypeScript

```js
// JavaScript

function popupSum(a, b) {
    alert(`${a} + ${b} = ${a + b}`);
}

function welcome(users) {
    users.forEach( user => console.log(`hello ${user}!`) );
}
```

```ts
// TypeScript

function popupSum(a: number, b: number): void {
    alert(`${a} + ${b} = ${a + b}`);
}

function welcome(users: string[]): void {
    users.forEach( user => console.log(`hello ${user}!`) );
}
```

### Anatomy of an Angular project

- module 1
  - .module.ts (`@NgModule`)
  - component 1
    - .ts (`@Component`)
    - .spec.ts
    - .html
    - .scss
  - component 2 ...
  - services (`@Injectable`)
  - directives
  - pipes
